<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bonus | Система премий отделов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #0b0f1c;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* карточки отделов (выбор) */
        .dept-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
            margin: 2rem 0;
        }
        .dept-card {
            background: #111827;
            border-radius: 1.5rem;
            padding: 1rem 2rem;
            width: 200px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #2d3a5e;
            transition: 0.2s;
        }
        .dept-card:hover {
            background: #1e293b;
            border-color: #3b82f6;
            transform: translateY(-3px);
        }
        /* модальное окно */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-card {
            background: #0f172a;
            border-radius: 2rem;
            padding: 2rem;
            width: 90%;
            max-width: 400px;
            border: 1px solid #334155;
        }
        input, button {
            width: 100%;
            padding: 0.7rem;
            margin: 0.5rem 0;
            border-radius: 2rem;
            border: none;
            background: #1e293b;
            color: white;
            font-size: 1rem;
        }
        button {
            background: #2563eb;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover {
            background: #1d4ed8;
        }
        .dashboard {
            background: #0f172a;
            border-radius: 2rem;
            padding: 1.5rem;
            margin-top: 1rem;
        }
        .dashboard h2 {
            border-left: 4px solid #3b82f6;
            padding-left: 1rem;
            margin-bottom: 1.5rem;
        }
        .settings-panel {
            background: #111827;
            padding: 1rem;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
        }
        .setting-row {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
        }
        .setting-row input {
            width: auto;
            flex: 2;
            margin: 0;
        }
        .setting-row span {
            flex: 3;
        }
        .employees-table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }
        .employees-table th, .employees-table td {
            padding: 0.5rem;
            border-bottom: 1px solid #1e293b;
            text-align: left;
        }
        .delete-employee {
            background: #7f1a1a;
            padding: 0.2rem 0.6rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            width: auto;
        }
        .btn-sm {
            width: auto;
            padding: 0.3rem 1rem;
            font-size: 0.8rem;
        }
        .back-btn {
            background: #334155;
            margin-bottom: 1rem;
        }
        hr {
            border-color: #1e293b;
            margin: 1rem 0;
        }
        .add-action-btn, .delete-action-btn {
            width: auto;
            padding: 0.3rem 1rem;
            font-size: 0.8rem;
            margin-left: 1rem;
        }
        .delete-action-btn {
            background: #7f1a1a;
        }
        .action-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>

<div id="app" class="container"></div>

<script>
    // --------------------------------------------------------------
    // 1. КОНФИГУРАЦИЯ ОТДЕЛОВ (пароли и стандартные веса)
    // --------------------------------------------------------------
    const DEPARTMENTS = {
        "hr": {
            name: "Кадры",
            password: "hr2025",
            settings: {
                "Принятие человека": 3,
                "Проведение собеседования": 3,
                "Принятие экзамена": 2,
                "Принятие отработки выговора": 2,
                "Присутствие на чужом собеседовании": 1,
                "Проверка отчета на повышение": 1,
                "ТОП-Актив по звездам в конце недели": 10,
                "Выполнение 'Халтурки' 7 дней подряд": 10,
                "Проведение агитации 30 минут": 5
            }
        },
        "events": {
            name: "Мероприятия",
            password: "event2025",
            settings: {
                "Помощь в МП": 1,
                "Проведение МП": 2,
                "Помощь в ГМП": 3,
                "Проведение ГМП": 4,
                "Найденный спонсор": 2
            }
        },
        "broadcast": {
            name: "Эфиры",
            password: "air2025",
            settings: {
                "Выполнение 'Халтурки' 7 дней": 15,
                "Проведение Интервью": 5,
                "Рубрики: Погода, Гороскоп": 1,
                "Рубрики: Факты, Книга рекордов": 2,
                "Рубрики: Викторина, Слово из букв": 3,
                "Рубрики: Угадайка, Сейф, Найди лишнее": 4
            }
        },
        "journalism": {
            name: "Журналистика",
            password: "news2025",
            settings: {
                "Журнал": 4,
                "Интервью с ВАЖНЫМ человеком": 3,
                "Репортаж с МП/ГМП": 2,
                "Новостной репортаж": 1,
                "Статья": 1,
                "Халтурка": 15
            }
        }
    };

    // Стандартная структура данных для отдела
    function getEmptyDeptData() {
        return {
            settings: {},
            employees: [],      // { name, points }
            totalBonusRub: 0
        };
    }

    // Загрузка/сохранение (localStorage)
    function loadAllData() {
        const raw = localStorage.getItem("bonus_depts_data");
        if (raw) {
            try {
                return JSON.parse(raw);
            } catch(e) { console.warn(e); }
        }
        // инициализация дефолтными настройками
        let init = {};
        for (let [id, dept] of Object.entries(DEPARTMENTS)) {
            let data = getEmptyDeptData();
            data.settings = { ...dept.settings };
            init[id] = data;
        }
        return init;
    }

    function saveAllData(data) {
        localStorage.setItem("bonus_depts_data", JSON.stringify(data));
    }

    // --------------------------------------------------------------
    // 2. ГЛАВНЫЙ ЭКРАН (выбор отдела)
    // --------------------------------------------------------------
    function renderMainScreen() {
        const app = document.getElementById("app");
        app.innerHTML = `
            <div style="text-align: center; margin-bottom: 1rem;">
                <h1>📊 Система премий отделов</h1>
                <p style="color: #94a3b8;">Выберите отдел для входа</p>
            </div>
            <div class="dept-grid" id="deptGrid"></div>
        `;
        const grid = document.getElementById("deptGrid");
        for (let [id, info] of Object.entries(DEPARTMENTS)) {
            const card = document.createElement("div");
            card.className = "dept-card";
            card.innerText = info.name;
            card.onclick = () => showPasswordModal(id);
            grid.appendChild(card);
        }
    }

    // Модалка ввода пароля
    function showPasswordModal(deptId) {
        const modalDiv = document.createElement("div");
        modalDiv.className = "modal";
        modalDiv.innerHTML = `
            <div class="modal-card">
                <h3>🔐 Вход в отдел «${DEPARTMENTS[deptId].name}»</h3>
                <input type="password" id="deptPassword" placeholder="Пароль отдела" autocomplete="off">
                <button id="submitPasswordBtn">Войти</button>
                <button id="closeModalBtn" style="background:#334155;">Отмена</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        const passwordInput = modalDiv.querySelector("#deptPassword");
        const submitBtn = modalDiv.querySelector("#submitPasswordBtn");
        const closeBtn = modalDiv.querySelector("#closeModalBtn");

        const tryLogin = () => {
            if (passwordInput.value === DEPARTMENTS[deptId].password) {
                modalDiv.remove();
                openDepartmentDashboard(deptId);
            } else {
                alert("Неверный пароль!");
                passwordInput.value = "";
            }
        };
        submitBtn.onclick = tryLogin;
        closeBtn.onclick = () => modalDiv.remove();
        passwordInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") tryLogin();
        });
        passwordInput.focus();
    }

    // --------------------------------------------------------------
    // 3. ПАНЕЛЬ УПРАВЛЕНИЯ ОТДЕЛОМ (настройки, сотрудники, бонус)
    //    + возможность добавлять/удалять действия
    // --------------------------------------------------------------
    function openDepartmentDashboard(deptId) {
        let allData = loadAllData();
        if (!allData[deptId]) allData[deptId] = getEmptyDeptData();
        // синхронизируем настройки: если добавились новые поля в эталон, но их нет в сохранённых
        const defaultSettings = DEPARTMENTS[deptId].settings;
        if (!allData[deptId].settings) allData[deptId].settings = {};
        for (let [key, val] of Object.entries(defaultSettings)) {
            if (allData[deptId].settings[key] === undefined) {
                allData[deptId].settings[key] = val;
            }
        }
        saveAllData(allData);
        renderDashboard(deptId);
    }

    function renderDashboard(deptId) {
        const app = document.getElementById("app");
        let allData = loadAllData();
        const deptData = allData[deptId];
        const deptInfo = DEPARTMENTS[deptId];
        const settings = deptData.settings;
        const employees = deptData.employees || [];
        const totalBonusRub = deptData.totalBonusRub || 0;

        // Формируем список сотрудников
        let employeesHtml = `<table class="employees-table">
            <thead><tr><th>Сотрудник</th><th>Сумма баллов</th><th></th></thead><tbody>`;
        employees.forEach((emp, idx) => {
            employeesHtml += `<tr>
                <td>${escapeHtml(emp.name)}</td>
                <td><strong>${emp.points}</strong></td>
                <td><button class="delete-employee" data-empidx="${idx}">✖</button></td>
            </tr>`;
        });
        employeesHtml += `</tbody></table>`;

        // Форма добавления сотрудника (с баллами по каждому действию)
        let addFormHtml = `<div style="background:#0a0f1f; padding:1rem; border-radius:1rem; margin:1rem 0;">
            <h4>➕ Добавить сотрудника</h4>
            <input type="text" id="newEmployeeName" placeholder="Имя и фамилия" style="margin-bottom: 0.5rem;">
            <div id="pointsFields"></div>
            <button id="addEmployeeBtn" style="margin-top: 0.5rem;">Добавить сотрудника</button>
        </div>`;

        // --- Редактор весов (настройки) с возможностью добавления/удаления действий ---
        let settingsHtml = `<div class="settings-panel">
            <h4>⚙️ Настройка весов (баллы за действие)</h4>
            <div id="actionsList"></div>
            <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                <input type="text" id="newActionName" placeholder="Новое действие" style="flex: 2;">
                <input type="number" id="newActionWeight" placeholder="Баллы" style="width: 100px;">
                <button id="addNewActionBtn" class="btn-sm">➕ Добавить действие</button>
            </div>
        </div>`;

        // Блок премии
        let bonusHtml = `<div style="background:#0a0f1f; border-radius:1rem; padding:1rem; margin: 1rem 0;">
            <label>💰 Общая сумма премии для отдела (₽):</label>
            <input type="number" id="totalBonusRub" value="${totalBonusRub}" style="width: 200px; display: inline-block; margin-left: 1rem;">
            <button id="recalcBonusBtn" class="btn-sm">Пересчитать и распределить</button>
            <div id="bonusResult" style="margin-top: 0.8rem; font-size:0.9rem;"></div>
        </div>`;

        const dashboardHtml = `
            <button id="backToMainBtn" class="back-btn">← К списку отделов</button>
            <div class="dashboard">
                <h2>📁 ${deptInfo.name}</h2>
                ${settingsHtml}
                ${employeesHtml}
                ${addFormHtml}
                ${bonusHtml}
                <hr>
                <div style="display: flex; gap: 1rem; justify-content: space-between;">
                    <button id="exportBackupBtn" style="background:#2d3a5e;">💾 Экспорт бэкап (JSON)</button>
                    <label style="background:#2d3a5e; padding: 0.7rem; border-radius: 2rem; cursor: pointer;">
                        📂 Импорт бэкапа
                        <input type="file" id="importBackupInput" accept=".json" style="display: none;">
                    </label>
                </div>
            </div>
        `;

        app.innerHTML = dashboardHtml;

        // --- Функция обновления списка действий и полей для баллов ---
        function renderActionsList() {
            const actionsContainer = document.getElementById("actionsList");
            if (!actionsContainer) return;
            let actionsHtml = "";
            for (let [action, weight] of Object.entries(settings)) {
                actionsHtml += `
                    <div class="action-item">
                        <span style="flex: 3;">${escapeHtml(action)}</span>
                        <input type="number" value="${weight}" class="weight-input" data-action="${escapeHtml(action)}" style="width: 80px;">
                        <button class="update-weight-btn" data-action="${escapeHtml(action)}" style="width: auto; padding: 0.2rem 1rem;">Сохранить</button>
                        <button class="delete-action-btn" data-action="${escapeHtml(action)}" style="width: auto; padding: 0.2rem 1rem;">❌</button>
                    </div>
                `;
            }
            actionsContainer.innerHTML = actionsHtml;

            // обработчики изменения веса
            document.querySelectorAll(".update-weight-btn").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    const action = btn.getAttribute("data-action");
                    const input = document.querySelector(`.weight-input[data-action="${action}"]`);
                    if (input) {
                        let newVal = parseInt(input.value);
                        if (isNaN(newVal)) newVal = 0;
                        settings[action] = newVal;
                        let freshData = loadAllData();
                        freshData[deptId].settings = settings;
                        saveAllData(freshData);
                        renderDashboard(deptId);
                    }
                });
            });

            // обработчики удаления действия
            document.querySelectorAll(".delete-action-btn").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    const action = btn.getAttribute("data-action");
                    if (confirm(`Удалить действие "${action}"? Это может повлиять на уже начисленные баллы сотрудников.`)) {
                        delete settings[action];
                        let freshData = loadAllData();
                        freshData[deptId].settings = settings;
                        saveAllData(freshData);
                        renderDashboard(deptId);
                    }
                });
            });
        }

        function renderPointsFields() {
            const container = document.getElementById("pointsFields");
            if (!container) return;
            let fields = "";
            for (let [action, weight] of Object.entries(settings)) {
                fields += `<div style="margin-bottom: 5px;">
                    <label style="font-size:0.8rem;">${escapeHtml(action)} (${weight} балл):</label>
                    <input type="number" min="0" value="0" class="point-input" data-action="${escapeHtml(action)}" style="width: 80px; margin-left: 10px;">
                </div>`;
            }
            container.innerHTML = fields;
        }

        renderActionsList();
        renderPointsFields();

        // Добавление нового действия
        document.getElementById("addNewActionBtn")?.addEventListener("click", () => {
            const newAction = document.getElementById("newActionName")?.value.trim();
            const newWeight = parseInt(document.getElementById("newActionWeight")?.value);
            if (!newAction) { alert("Введите название действия"); return; }
            if (isNaN(newWeight) || newWeight <= 0) { alert("Введите корректное количество баллов (>0)"); return; }
            if (settings[newAction]) { alert("Такое действие уже существует!"); return; }
            settings[newAction] = newWeight;
            let freshData = loadAllData();
            freshData[deptId].settings = settings;
            saveAllData(freshData);
            renderDashboard(deptId);
        });

        // Добавление сотрудника
        document.getElementById("addEmployeeBtn")?.addEventListener("click", () => {
            const nameInput = document.getElementById("newEmployeeName");
            const name = nameInput.value.trim();
            if (!name) { alert("Введите имя!"); return; }
            let totalPoints = 0;
            const pointsInputs = document.querySelectorAll(".point-input");
            for (let inp of pointsInputs) {
                const action = inp.getAttribute("data-action");
                const weight = settings[action] || 0;
                const count = parseInt(inp.value) || 0;
                totalPoints += count * weight;
            }
            if (totalPoints === 0) { alert("Добавьте хотя бы одно действие с баллами >0"); return; }
            let freshData = loadAllData();
            if (!freshData[deptId].employees) freshData[deptId].employees = [];
            freshData[deptId].employees.push({ name: name, points: totalPoints });
            saveAllData(freshData);
            renderDashboard(deptId);
        });

        // Удаление сотрудника
        document.querySelectorAll(".delete-employee").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const idx = btn.getAttribute("data-empidx");
                if (confirm("Удалить сотрудника?")) {
                    let freshData = loadAllData();
                    freshData[deptId].employees.splice(idx, 1);
                    saveAllData(freshData);
                    renderDashboard(deptId);
                }
            });
        });

        // Расчёт премии
        document.getElementById("recalcBonusBtn")?.addEventListener("click", () => {
            let freshData = loadAllData();
            const fundInput = document.getElementById("totalBonusRub");
            let fund = parseInt(fundInput.value) || 0;
            freshData[deptId].totalBonusRub = fund;
            saveAllData(freshData);
            const employeesList = freshData[deptId].employees;
            const totalPoints = employeesList.reduce((sum, e) => sum + e.points, 0);
            let resultText = `💰 Распределение ${fund} ₽:\n`;
            if (totalPoints === 0 || employeesList.length === 0) {
                resultText = "Нет сотрудников с баллами.";
            } else {
                for (let emp of employeesList) {
                    let share = emp.points / totalPoints;
                    let payout = Math.floor(share * fund);
                    resultText += `👤 ${emp.name} (баллы: ${emp.points}) → ${payout} ₽\n`;
                }
            }
            document.getElementById("bonusResult").innerHTML = `<pre style="white-space: pre-wrap;">${escapeHtml(resultText)}</pre>`;
        });

        // Экспорт / Импорт бэкапа
        document.getElementById("exportBackupBtn")?.addEventListener("click", () => {
            const fullBackup = loadAllData();
            const dataStr = JSON.stringify(fullBackup, null, 2);
            const blob = new Blob([dataStr], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `bonus_backup_${deptId}.json`;
            a.click();
            URL.revokeObjectURL(url);
        });

        const fileInput = document.getElementById("importBackupInput");
        if (fileInput) {
            fileInput.addEventListener("change", (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const imported = JSON.parse(ev.target.result);
                        if (imported && typeof imported === "object") {
                            saveAllData(imported);
                            renderDashboard(deptId);
                            alert("Бэкап успешно восстановлен!");
                        } else throw new Error();
                    } catch(err) {
                        alert("Ошибка: неверный формат файла");
                    }
                };
                reader.readAsText(file);
                fileInput.value = "";
            });
        }

        document.getElementById("backToMainBtn").onclick = () => renderMainScreen();
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === "&") return "&amp;";
            if (m === "<") return "&lt;";
            if (m === ">") return "&gt;";
            return m;
        });
    }

    renderMainScreen();
</script>
</body>
</html>
