<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Neon Bonus | Система премий отделов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0a2a, #03030f);
            color: #e2e8f0;
            padding: 2rem 1rem;
            min-height: 100vh;
        }

        /* Контейнер */
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Заголовок */
        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #a5f3fc, #c084fc, #f472b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            letter-spacing: -0.5px;
        }

        .header p {
            color: #94a3b8;
            margin-top: 0.5rem;
            font-size: 1.1rem;
        }

        /* Сетка отделов */
        .departments-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        /* Карточка отдела */
        .card {
            background: rgba(15, 25, 45, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(0, 255, 255, 0.2);
            padding: 1.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .card:hover {
            border-color: #0ff;
            box-shadow: 0 0 18px rgba(0, 255, 255, 0.2);
            transform: translateY(-4px);
        }

        .card h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1.25rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px dashed rgba(0, 255, 255, 0.4);
            display: inline-block;
        }

        /* Таблица сотрудников */
        .employees-table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            font-size: 0.9rem;
        }

        .employees-table th,
        .employees-table td {
            padding: 8px 6px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .employees-table th {
            color: #7dd3fc;
            font-weight: 600;
        }

        .delete-btn {
            background: rgba(255, 70, 70, 0.2);
            border: none;
            color: #ffb3b3;
            cursor: pointer;
            font-size: 1.1rem;
            border-radius: 20px;
            width: 28px;
            height: 28px;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background: #f43f5e;
            color: white;
            transform: scale(1.05);
        }

        /* Формы */
        .form-group {
            margin-bottom: 0.8rem;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.7rem;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
            border-radius: 1rem;
            color: white;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #0ff;
            box-shadow: 0 0 8px #0ff;
        }

        /* Баллы (inline) */
        .scores-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin: 1rem 0;
            align-items: flex-end;
        }
        .score-field {
            flex: 1;
            min-width: 100px;
        }
        .score-field label {
            font-size: 0.7rem;
            color: #94a3b8;
            display: block;
        }

        /* Кнопки */
        .btn {
            background: linear-gradient(95deg, #1e293b, #0f172a);
            border: 1px solid #2dd4bf;
            color: #ccfbf1;
            padding: 0.6rem 1rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(95deg, #0f2b3d, #0a1a2b);
            border-color: #38bdf8;
            color: #bae6fd;
        }

        .btn-primary:hover {
            background: #0284c7;
            color: white;
            border-color: #7dd3fc;
            box-shadow: 0 0 12px #0ff;
        }

        .calc-btn {
            margin-top: 1rem;
            background: linear-gradient(95deg, #2d3a4b, #111827);
            border-color: #f97316;
            color: #fed7aa;
        }

        .calc-btn:hover {
            background: #ea580c;
            border-color: #f97316;
            box-shadow: 0 0 14px #f97316;
        }

        .total-bonus {
            background: #02061780;
            padding: 0.8rem;
            border-radius: 1rem;
            text-align: center;
            margin-top: 1rem;
            font-weight: bold;
            border-left: 4px solid #facc15;
            font-size: 1.1rem;
        }

        /* Футер с ошибкой */
        .error-section {
            max-width: 600px;
            margin: 2rem auto 0;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 2rem;
            padding: 1.5rem;
            border: 1px solid #f472b6;
        }
        .error-section h3 {
            color: #f9a8d4;
            margin-bottom: 1rem;
        }
        textarea {
            width: 100%;
            padding: 0.8rem;
            background: #0f172a;
            border: 1px solid #c084fc;
            border-radius: 1rem;
            color: white;
        }
        .btn-error {
            background: #4c0519;
            border-color: #f43f5e;
            color: #fecdd3;
            margin-top: 0.7rem;
        }

        @media (max-width: 760px) {
            .departments-grid {
                grid-template-columns: 1fr;
            }
            .scores-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚡ NEON BONUS ⚡</h1>
        <p>Система учёта активности отделов и расчёта премии</p>
    </div>

    <div class="departments-grid" id="departmentsGrid"></div>

    <!-- БЛОК ОБРАТНОЙ СВЯЗИ -->
    <div class="error-section">
        <h3>📢 Сообщить об ошибке / идея</h3>
        <textarea id="feedbackText" rows="2" placeholder="Опишите проблему или предложение..."></textarea>
        <button id="sendFeedbackBtn" class="btn btn-error">📨 Отправить в Discord</button>
    </div>
</div>

<script>
    // ---------- 🔧 НАСТРОЙКА DISCORD (твой вебхук) ----------
    const DISCORD_FEEDBACK_WEBHOOK = "https://discord.com/api/webhooks/1500489792159354900/temeK7DdbRTfd88JBRD_2vLM8QpDRpUMl4CBsyyfrVbw3fJ64znRfr52nZ4iZNEN-7Ks";

    // ------------------------------------------------------------
    // 1. СТРУКТУРА ДАННЫХ (localStorage)
    // ------------------------------------------------------------
    const defaultData = {
        "Кадры": { employees: [], totalBonusRub: 0 },
        "Мероприятия": { employees: [], totalBonusRub: 0 },
        "Эфиры": { employees: [], totalBonusRub: 0 },
        "Журналистика": { employees: [], totalBonusRub: 0 }
    };

    // Загрузка / сохранение
    function loadData() {
        const saved = localStorage.getItem("neonBonusData");
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                // миграция: если нет поля employees — подставить []
                for (let key of Object.keys(defaultData)) {
                    if (!parsed[key]) parsed[key] = { employees: [], totalBonusRub: 0 };
                    if (!parsed[key].employees) parsed[key].employees = [];
                    if (parsed[key].totalBonusRub === undefined) parsed[key].totalBonusRub = 0;
                }
                return parsed;
            } catch(e) { console.warn(e); }
        }
        return JSON.parse(JSON.stringify(defaultData));
    }

    function saveData(data) {
        localStorage.setItem("neonBonusData", JSON.stringify(data));
    }

    // ------------------------------------------------------------
    // 2. КОНФИГУРАЦИЯ ОТДЕЛОВ (название и поля)
    // ------------------------------------------------------------
    const departmentsConfig = {
        "Кадры": {
            fields: [
                { id: "points1", label: "Принятие человека", basePoints: 3 },
                { id: "points2", label: "Проведение собеседования", basePoints: 3 },
                { id: "points3", label: "Принятие экзамена", basePoints: 2 },
                { id: "points4", label: "Принятие отработки выговора", basePoints: 2 },
                { id: "points5", label: "Присутствие на чужом собеседовании", basePoints: 1 },
                { id: "points6", label: "Проверка отчета на повышение", basePoints: 1 },
                { id: "points7", label: "ТОП-Актив по звездам в конце недели", basePoints: 10 },
                { id: "points8", label: "Выполнение 'Халтурки' 7 дней подряд", basePoints: 10 },
                { id: "points9", label: "Проведение агитации 30 минут", basePoints: 5 }
            ]
        },
        "Мероприятия": {
            fields: [
                { id: "points1", label: "Помощь в МП", basePoints: 1 },
                { id: "points2", label: "Проведение МП", basePoints: 2 },
                { id: "points3", label: "Помощь в ГМП", basePoints: 3 },
                { id: "points4", label: "Проведение ГМП", basePoints: 4 },
                { id: "points5", label: "Найденный спонсор", basePoints: 2 }
            ]
        },
        "Эфиры": {
            fields: [
                { id: "points1", label: "Выполнение 'Халтурки' 7 дней", basePoints: 15 },
                { id: "points2", label: "Проведение Интервью", basePoints: 5 },
                { id: "points3", label: "Рубрики: Погода, Гороскоп", basePoints: 1 },
                { id: "points4", label: "Рубрики: Факты, Книга рекордов", basePoints: 2 },
                { id: "points5", label: "Рубрики: Викторина, Слово из букв", basePoints: 3 },
                { id: "points6", label: "Рубрики: Угадайка, Сейф, Найди лишнее", basePoints: 4 }
            ]
        },
        "Журналистика": {
            fields: [
                { id: "points1", label: "Журнал", basePoints: 4 },
                { id: "points2", label: "Интервью с ВАЖНЫМ человеком", basePoints: 3 },
                { id: "points3", label: "Репортаж с МП/ГМП", basePoints: 2 },
                { id: "points4", label: "Новостной репортаж", basePoints: 1 },
                { id: "points5", label: "Статья", basePoints: 1 },
                { id: "points6", label: "Халтурка", basePoints: 15 }
            ]
        }
    };

    // ------------------------------------------------------------
    // 3. HELPER: рендер одного отдела
    // ------------------------------------------------------------
    function renderDepartment(departmentName, data, container) {
        const deptData = data[departmentName];
        const config = departmentsConfig[departmentName];
        if (!config) return;

        const card = document.createElement("div");
        card.className = "card";

        // Заголовок
        card.innerHTML = `<h2>📌 ${departmentName}</h2>`;

        // Таблица сотрудников
        let employeesHtml = `<table class="employees-table">
            <thead><tr><th>Имя</th><th>Баллы</th><th></th></tr></thead><tbody>`;
        deptData.employees.forEach((emp, idx) => {
            employeesHtml += `
                <tr>
                    <td>${escapeHtml(emp.name)}</td>
                    <td><strong>${emp.totalPoints}</strong></td>
                    <td><button class="delete-btn" data-dept="${departmentName}" data-empidx="${idx}">✖</button></td>
                </tr>
            `;
        });
        employeesHtml += `</tbody></table>`;

        // Форма добавления
        let formHtml = `<div class="form-group"><input type="text" id="name_${departmentName}" placeholder="Имя и Фамилия" autocomplete="off"></div>`;
        let scoresHtml = `<div class="scores-group">`;
        config.fields.forEach(field => {
            scoresHtml += `<div class="score-field">
                <label>${field.label} (${field.basePoints} балл)</label>
                <input type="number" min="0" step="0" value="0" id="${field.id}_${departmentName}" placeholder="0">
            </div>`;
        });
        scoresHtml += `</div>`;

        // Блок премии
        const totalBonusHtml = `<div class="total-bonus">💰 Премия отдела: <strong><span id="totalRub_${departmentName}">${deptData.totalBonusRub}</span> ₽</strong></div>`;

        card.innerHTML += employeesHtml + formHtml + scoresHtml +
            `<button class="btn btn-primary add-employee-btn" data-dept="${departmentName}">➕ Добавить сотрудника</button>` +
            totalBonusHtml +
            `<div class="form-group" style="margin-top: 0.8rem;"><input type="number" id="bonusInput_${departmentName}" placeholder="Общая сумма премии для отдела (₽)" value="${deptData.totalBonusRub}"></div>
            <button class="btn calc-btn" data-calcbonus="${departmentName}">💰 Рассчитать премии</button>`;

        container.appendChild(card);
    }

    // ------------------------------------------------------------
    // 4. ЛОГИКА БАЛЛОВ И ВЫПЛАТ
    // ------------------------------------------------------------
    function getEmployeePoints(config, departmentName, formPrefix = "") {
        let total = 0;
        for (let field of config.fields) {
            const input = document.getElementById(`${field.id}_${departmentName}`);
            if (input && input.value) {
                total += parseInt(input.value) * field.basePoints;
            }
        }
        return total;
    }

    function addEmployeeToDept(departmentName, data, name, points) {
        if (!name || points <= 0) return false;
        const dept = data[departmentName];
        dept.employees.push({ name: name.trim(), totalPoints: points });
        saveData(data);
        return true;
    }

    function removeEmployee(departmentName, empIdx, data) {
        data[departmentName].employees.splice(empIdx, 1);
        saveData(data);
    }

    function recalcAndShowBonuses(departmentName, data) {
        const dept = data[departmentName];
        const bonusRubInput = document.getElementById(`bonusInput_${departmentName}`);
        let totalFund = parseInt(bonusRubInput?.value) || 0;
        if (totalFund < 0) totalFund = 0;
        dept.totalBonusRub = totalFund;
        saveData(data);

        // пересчитываем выплаты (распределение пропорционально баллам)
        const employees = dept.employees;
        const totalPoints = employees.reduce((sum, e) => sum + e.totalPoints, 0);
        let resultMsg = `🎯 Распределение премии отдела "${departmentName}" (${totalFund} ₽):\n`;
        if (totalPoints === 0 || employees.length === 0) {
            resultMsg += "❌ Нет сотрудников с баллами, премия не распределена.";
            alert(resultMsg);
            return;
        }
        for (let emp of employees) {
            const share = totalPoints > 0 ? emp.totalPoints / totalPoints : 0;
            const payout = Math.floor(share * totalFund);
            resultMsg += `👤 ${emp.name} (баллы: ${emp.totalPoints}) — ${payout} ₽\n`;
        }
        alert(resultMsg);
        // обновляем отображение суммы в карточке
        const totalSpan = document.getElementById(`totalRub_${departmentName}`);
        if (totalSpan) totalSpan.innerText = totalFund;
    }

    // ------------------------------------------------------------
    // 5. ОТПРАВКА FEEDBACK В DISCORD
    // ------------------------------------------------------------
    async function sendFeedbackToDiscord(text) {
        if (!text.trim()) return alert("Введите текст перед отправкой!");
        try {
            await fetch(DISCORD_FEEDBACK_WEBHOOK, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    content: `📝 **Фидбек / Ошибка**\n📌 ${text}\n🕒 ${new Date().toLocaleString()}`,
                    username: "NeonBonusBot"
                })
            });
            alert("✅ Сообщение отправлено в Discord!");
        } catch(e) {
            alert("❌ Ошибка при отправке.");
            console.error(e);
        }
    }

    // ------------------------------------------------------------
    // 6. ГЛАВНАЯ ИНИЦИАЛИЗАЦИЯ
    // ------------------------------------------------------------
    function init() {
        let data = loadData();
        const grid = document.getElementById("departmentsGrid");
        grid.innerHTML = "";

        for (let deptName of Object.keys(departmentsConfig)) {
            renderDepartment(deptName, data, grid);
        }

        // Вешаем события ПОСЛЕ отрисовки
        // Добавление сотрудников
        document.querySelectorAll(".add-employee-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const deptName = btn.getAttribute("data-dept");
                const nameInput = document.getElementById(`name_${deptName}`);
                const name = nameInput?.value.trim();
                const config = departmentsConfig[deptName];
                if (!config) return;
                const points = getEmployeePoints(config, deptName);
                if (!name) { alert("Введите имя сотрудника!"); return; }
                if (points <= 0) { alert("Добавьте хотя бы один балл (больше нуля)!"); return; }
                let newData = loadData();
                if (addEmployeeToDept(deptName, newData, name, points)) {
                    // Очищаем поля ввода баллов
                    for (let field of config.fields) {
                        const inp = document.getElementById(`${field.id}_${deptName}`);
                        if (inp) inp.value = "0";
                    }
                    if(nameInput) nameInput.value = "";
                    // Перезагружаем интерфейс
                    init();
                } else {
                    alert("Не удалось добавить сотрудника");
                }
            });
        });

        // Удаление сотрудников
        document.querySelectorAll(".delete-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const deptName = btn.getAttribute("data-dept");
                const empIdx = parseInt(btn.getAttribute("data-empidx"));
                let newData = loadData();
                removeEmployee(deptName, empIdx, newData);
                init();
            });
        });

        // Пересчёт премии
        document.querySelectorAll(".calc-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const deptName = btn.getAttribute("data-calcbonus");
                let freshData = loadData();
                recalcAndShowBonuses(deptName, freshData);
                init(); // обновляем отображение суммы
            });
        });
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === "&") return "&amp;";
            if (m === "<") return "&lt;";
            if (m === ">") return "&gt;";
            return m;
        });
    }

    // Отправка ошибки
    document.getElementById("sendFeedbackBtn")?.addEventListener("click", () => {
        const msg = document.getElementById("feedbackText")?.value;
        sendFeedbackToDiscord(msg);
        if(document.getElementById("feedbackText")) document.getElementById("feedbackText").value = "";
    });

    init();
</script>
</body>
</html>
